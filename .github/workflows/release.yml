name: Build Release APK

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to upload APK'
        required: false
        type: string

env:
  JAVA_VERSION: '21'
  ANDROID_COMPILE_SDK: '35'
  NODE_VERSION: '22'

jobs:
  build-release-apk:
    name: Build Release APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm dependencies
        run: npm ci

      - name: Install Ruby for iOS (required by RN)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Install bundle dependencies
        run: bundle install
        continue-on-error: true

      - name: Install iOS pods
        run: cd ios && bundle exec pod install && cd ..
        continue-on-error: true

      - name: Build Release APK
        run: |
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --warning-mode=all
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Verify APK exists
        run: |
          ls -lh android/app/build/outputs/apk/release/
          test -f android/app/build/outputs/apk/release/app-release.apk

      - name: Upload Release APK
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          tag_name: ${{ github.event.inputs.release_tag || github.ref_name }}
          name: Release ${{ github.event.inputs.release_tag || github.ref_name }}
          draft: false
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
          files: |
            android/app/build/outputs/apk/release/app-release.apk
          body: |
            ## GUIDY Release APK
            
            **Version:** ${{ github.event.inputs.release_tag || github.ref_name }}
            **Commit:** ${{ github.sha }}
            **Build:** ${{ github.run_number }}
            
            ### Download APK
            - **Release APK:** `app-release.apk`
            
            ### Features
            Built automatically from main branch.
            
            ---
            *Generated by GitHub Actions*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: guidy-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
